



<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./style/style.css"/>
</head>
<body>

  <!-- log-in page start -->
  <div id="login-page">
    <div class="login-card">

      <img src="./images/github-logo_25231 1.png" alt="">

      <h2>GitHub Issues Tracker</h2>
      <p>Sign in to manage your issues</p>

      <div class="login-error" id="login-error">Invalid username or password.</div>

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter Username" value="admin"/>
        <small>Default: admin</small>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter Password" value="admin123"/>
        <small>Default: admin123</small>
      </div>

      <button class="btn-signin" onclick="handleLogin()">Sign In</button>

      <div class="divider">OR</div>

      <div class="demo-creds">
        <div class="demo-label">Demo Credentials</div>
        <div>Username:  <span> admin</span></div>
        <div>Password:  <span> admin123</span></div>
      </div>

    </div>
  </div>
  <!-- log-in page end -->

  <!-- ===== main page ===== -->
  <div id="main-page" style="display: none;">

    <!-- navbar -->
    <nav class="navbar">
      <a class="navbar-brand" href="#">
        <img style="width: 25px; height: 
        25px;" src="./images/github-logo_25231 1.png" alt="">
        GitHub Issues Tracker
      </a>
      <div class="navbar-search">
        <div class="input-rapper">
          <img src="./images/icons8-search.svg" alt="">
          <input class="search-input" type="text" id="search-input" placeholder="Search issues..." />
        </div>
        <button class="btn-search" onclick="performSearch()">+ New Issues</button>
      </div>
    </nav>

    <!-- main content -->
    <div class="main-content">

      <!-- Tabs -->
      <div class="issues-header">
        <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">
          All <span class="tab-count" id="count-all">0</span>
        </button>
        <button class="tab-btn" id="tab-open" onclick="switchTab('open')">
          Open <span class="tab-count" id="count-open">0</span>
        </button>
        <button class="tab-btn" id="tab-closed" onclick="switchTab('closed')">
          Closed <span class="tab-count" id="count-closed">0</span>
        </button>
      </div>

      <!-- Summary Row -->
      <div class="issues-summary">
        <div class="left" style="display: flex;">
          <img src="./images/Status-open.png" alt="">
          <div class="left-text">
            <h4><span id="summary-total-count">0</span> Issues</h4>
            <p>Track and manage your project issues</p>
          </div>
        </div>
        <div class="right">
          <span class="summary-badge">
            <span class="dot dot-open"></span>
            <span id="summary-open-count">0</span> Open
          </span>
          <span class="summary-badge">
            <span class="dot dot-closed"></span>
            <span id="summary-closed-count">0</span> Closed
          </span>
        </div>
        <div id="search-label"></div>
      </div>

      <!-- Issues Grid -->
      <div class="issues-grid-wrap">
        <div id="issues-container">
          <div class="spinner-wrap">
            <div class="spinner"></div>
            <span>Loading issues...</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== modal structure ===== -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" onclick="closeModalDirect()">&#x2715;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
